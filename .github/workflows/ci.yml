name: Production CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # JOB 1: BACKEND VALIDATION
  backend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Security Scan (Audit)
        run: npm audit --audit-level=high
      
      - name: Build
        run: npm run build
      
      - name: Run Schema Validation
        run: |
          # Verify that database.sql is syntactically valid (Optional check)
          # In real prod, run against a temporary postgres container

  # JOB 2: FRONTEND VALIDATION
  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install Dependencies
        run: npm install
      
      - name: Build Frontend (Production Mode)
        run: npm run build
        env:
          NODE_ENV: production

  # JOB 3: INTEGRITY GATE
  security-scan:
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-check]
    steps:
      - uses: actions/checkout@v4
      - name: Check for Hardcoded Secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
