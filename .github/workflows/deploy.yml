
name: Production Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. TEST BACKEND
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Build Backend
        run: npm run build
      
      # Mock DB Test would run here
      # - name: Run Tests
      #   run: npm test

  # 2. BUILD FRONTEND
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install Dependencies
        run: npm install
      
      - name: Build Frontend
        run: npm run build

  # 3. DOCKER BUILD (Simulation)
  docker-validation:
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: false
          tags: bookyourservice/backend:latest
      
      - name: Build Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: bookyourservice/frontend:latest
