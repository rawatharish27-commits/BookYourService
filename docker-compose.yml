
version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: bys-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-bookyourservice}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - bys-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bys-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-bookyourservice}
      JWT_SECRET: ${JWT_SECRET:-supersecret_access_key_change_me_in_prod}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-supersecret_refresh_key_change_me_in_prod}
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:80
    ports:
      - "4000:4000"
    networks:
      - bys-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bys-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - bys-network

networks:
  bys-network:
    driver: bridge

volumes:
  postgres_data:
